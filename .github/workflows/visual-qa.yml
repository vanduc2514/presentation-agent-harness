name: Visual QA

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  visual-qa:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || startsWith(github.head_ref, 'presentation/')
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci --no-audit

      - name: Build presentation
        run: npm run build:markpress

      - name: Install Playwright Chromium browser
        run: npx playwright install chromium --with-deps

      - name: Run Visual QA (capture screenshots)
        run: node scripts/visual-qa.cjs

      - name: Upload screenshots as artifact
        uses: actions/upload-artifact@v4
        with:
          name: visual-qa-screenshots
          path: qa-screenshots/*.png
          if-no-files-found: error
          compression-level: 0

      - name: Publish screenshots to qa-artifacts branch
        if: github.event_name == 'pull_request'
        id: publish-screenshots
        uses: actions/github-script@v7
        with:
          script: |
            const fs   = require('fs');
            const path = require('path');

            const owner  = context.repo.owner;
            const repo   = context.repo.repo;
            const branch = 'qa-artifacts';
            const prNum  = context.payload.pull_request.number;
            const destPath = `pr-${prNum}/${context.runId}`;

            // Get or create the qa-artifacts branch
            let baseSha;
            try {
              const { data: ref } = await github.rest.git.getRef({
                owner, repo, ref: `heads/${branch}`,
              });
              baseSha = ref.object.sha;
            } catch (_) {
              const { data: emptyTree } = await github.rest.git.createTree({
                owner, repo, tree: [],
              });
              const { data: initCommit } = await github.rest.git.createCommit({
                owner, repo,
                message: 'init: create qa-artifacts branch',
                tree: emptyTree.sha,
                parents: [],
              });
              await github.rest.git.createRef({
                owner, repo,
                ref: `refs/heads/${branch}`,
                sha: initCommit.sha,
              });
              baseSha = initCommit.sha;
            }

            const { data: baseCommit } = await github.rest.git.getCommit({
              owner, repo, commit_sha: baseSha,
            });

            // Create blobs for all screenshots in parallel
            const screenshotsDir = 'qa-screenshots';
            const files = fs.readdirSync(screenshotsDir)
              .filter(f => f.endsWith('.png'))
              .sort();

            const treeItems = await Promise.all(files.map(async (file) => {
              const content = fs.readFileSync(path.join(screenshotsDir, file));
              const { data: blob } = await github.rest.git.createBlob({
                owner, repo,
                content: content.toString('base64'),
                encoding: 'base64',
              });
              return {
                path: `${destPath}/${file}`,
                mode: '100644',
                type: 'blob',
                sha: blob.sha,
              };
            }));

            // Create a new tree on top of the existing qa-artifacts tree
            const { data: newTree } = await github.rest.git.createTree({
              owner, repo,
              base_tree: baseCommit.tree.sha,
              tree: treeItems,
            });

            const { data: newCommit } = await github.rest.git.createCommit({
              owner, repo,
              message: `chore: visual QA screenshots for PR #${prNum}`,
              tree: newTree.sha,
              parents: [baseSha],
            });

            await github.rest.git.updateRef({
              owner, repo,
              ref: `heads/${branch}`,
              sha: newCommit.sha,
            });

            core.setOutput('dest_path', destPath);
            core.setOutput('commit_sha', newCommit.sha);

      - name: Post Visual QA screenshots to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          SCREENSHOTS_PATH: ${{ steps.publish-screenshots.outputs.dest_path }}
          SCREENSHOTS_SHA: ${{ steps.publish-screenshots.outputs.commit_sha }}
        with:
          script: |
            const owner  = context.repo.owner;
            const repo   = context.repo.repo;
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${context.runId}`;
            const destPath = process.env.SCREENSHOTS_PATH;
            const ref      = process.env.SCREENSHOTS_SHA;

            const viewports = [
              { name: 'desktop-1920x1080', label: 'Desktop (1920×1080)' },
              { name: 'laptop-1440x900',   label: 'Laptop  (1440×900)'  },
              { name: 'laptop-1280x800',   label: 'Laptop  (1280×800)'  },
              { name: 'tablet-768x1024',   label: 'Tablet  (768×1024)'  },
              { name: 'mobile-390x844',    label: 'Mobile  (390×844)'   },
            ];
            const SLIDES = 15;

            const sections = viewports.map(vp => {
              const images = Array.from({ length: SLIDES }, (_, i) => {
                const file = `${vp.name}_slide-${String(i + 1).padStart(2, '0')}.png`;
                const url  = `https://raw.githubusercontent.com/${owner}/${repo}/${ref}/${destPath}/${file}`;
                return `**Slide ${i + 1}**\n![${vp.label} – slide ${i + 1}](${url})`;
              }).join('\n\n');

              return `<details>\n<summary>${vp.label}</summary>\n\n${images}\n\n</details>`;
            }).join('\n\n');

            const body = [
              '## 📸 Visual QA — Screenshots',
              '',
              `Captured **${viewports.length} viewports × ${SLIDES} slides = ${viewports.length * SLIDES} screenshots** from commit \`${context.sha.slice(0, 7)}\`.`,
              '',
              sections,
              '',
              `> [📥 Download all screenshots](${runUrl})`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number: context.issue.number,
            });

            const marker = '## 📸 Visual QA — Screenshots';
            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' && c.body.startsWith(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo,
                comment_id: existing.id,
                body,
              });
              console.log('Updated existing Visual QA comment.');
            } else {
              await github.rest.issues.createComment({
                owner, repo,
                issue_number: context.issue.number,
                body,
              });
              console.log('Created new Visual QA comment.');
            }
