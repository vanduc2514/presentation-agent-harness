name: Visual QA

on:
  pull_request:
    branches: [main]
  push:
    branches: [copilot/**]
  workflow_dispatch:

jobs:
  visual-qa:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci --no-audit

      - name: Build presentation
        run: npm run build:markpress

      - name: Install Playwright Chromium browser
        run: npx playwright install chromium --with-deps

      - name: Run Visual QA (capture screenshots)
        run: node scripts/visual-qa.cjs

      - name: Upload screenshots as artifact
        uses: actions/upload-artifact@v4
        with:
          name: visual-qa-screenshots
          path: qa-screenshots/*.png
          if-no-files-found: error
          compression-level: 0

      - name: Post Visual QA screenshots to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const owner  = context.repo.owner;
            const repo   = context.repo.repo;
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${context.runId}`;

            const body = [
              '## 📸 Visual QA — Screenshots',
              '',
              `Screenshots captured from commit \`${context.sha.slice(0, 7)}\` across all slides and viewports.`,
              '',
              `> [📥 Download screenshots artifact](${runUrl})`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number: context.issue.number,
            });

            const marker = '## 📸 Visual QA — Screenshots';
            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' && c.body.startsWith(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo,
                comment_id: existing.id,
                body,
              });
              console.log('Updated existing Visual QA comment.');
            } else {
              await github.rest.issues.createComment({
                owner, repo,
                issue_number: context.issue.number,
                body,
              });
              console.log('Created new Visual QA comment.');
            }
